# Experiment Queue (v2 — corrected after parameter passthrough diagnosis)
#
# Lessons from the first batch:
# 1. exp_004, exp_005: htf_rsi_long_max was tautological at 4h+4h (entry RSI
#    forced HTF RSI to same value). Must test with DIFFERENT entry and HTF
#    timeframes. Now configured with explicit different intervals.
#
# 2. exp_006, exp_008: breakeven_requires_tp1 default is already True, so
#    testing `true` produced no change. After runner fix, we can test `false`.
#
# 3. Volume filter at any value (1.2, 1.5, 2.0) HURT performance. Filter
#    appears to disable a more conservative protective rule. Not pursuing
#    further until investigated.
#
# 4. ATR stop 1.0 was marginally better than baseline ($17.85 vs $17.12)
#    but worse on WR and DD. Worth exploring between 1.0 and 1.5.

baseline:
  description: "Current production config (no overrides)"
  strategy: vwap_meanrev
  days: 1826
  interval: 4h
  config_overrides: {}

experiments:
  # ─────────────────────────────────────────────────────────────────────
  # ROUND 2 — RE-RUNS OF AFFECTED EXPERIMENTS
  # ─────────────────────────────────────────────────────────────────────

  - id: exp_011_no_breakeven_tp1
    description: "Breakeven activates immediately (not requiring TP1) - tests false against default true"
    strategy: vwap_meanrev
    days: 1826
    interval: 4h
    config_overrides:
      breakeven_requires_tp1: false

  - id: exp_012_htf_rsi_40_1h
    description: "HTF RSI <= 40 with HTF computed on 1h bars (entry still 4h)"
    strategy: vwap_meanrev
    days: 1826
    interval: 4h
    config_overrides:
      htf_rsi_long_max: 40
      htf_rsi_bars_interval: "1h"

  - id: exp_013_htf_rsi_35_1h
    description: "HTF RSI <= 35 with HTF computed on 1h bars (stricter)"
    strategy: vwap_meanrev
    days: 1826
    interval: 4h
    config_overrides:
      htf_rsi_long_max: 35
      htf_rsi_bars_interval: "1h"

  - id: exp_014_htf_rsi_45_1h
    description: "HTF RSI <= 45 with HTF on 1h (looser - sanity check)"
    strategy: vwap_meanrev
    days: 1826
    interval: 4h
    config_overrides:
      htf_rsi_long_max: 45
      htf_rsi_bars_interval: "1h"

  # ─────────────────────────────────────────────────────────────────────
  # ROUND 3 — GRADIENT AROUND ATR STOP 1.0 (the marginal winner)
  # ─────────────────────────────────────────────────────────────────────

  - id: exp_015_atr_stop_11
    description: "ATR stop 1.1 - gradient between exp_010 (1.0) winner and baseline (1.5)"
    strategy: vwap_meanrev
    days: 1826
    interval: 4h
    config_overrides:
      atr_stop_mult: 1.1

  - id: exp_016_atr_stop_12
    description: "ATR stop 1.2 - gradient"
    strategy: vwap_meanrev
    days: 1826
    interval: 4h
    config_overrides:
      atr_stop_mult: 1.2

  - id: exp_017_atr_stop_13
    description: "ATR stop 1.3 - gradient"
    strategy: vwap_meanrev
    days: 1826
    interval: 4h
    config_overrides:
      atr_stop_mult: 1.3

  # ─────────────────────────────────────────────────────────────────────
  # ROUND 4 — COMBINATIONS WITH FIXED PARAMETERS
  # ─────────────────────────────────────────────────────────────────────

  - id: exp_018_atr_10_no_breakeven_tp1
    description: "Combine tight stop (1.0 ATR) + breakeven-immediate"
    strategy: vwap_meanrev
    days: 1826
    interval: 4h
    config_overrides:
      atr_stop_mult: 1.0
      breakeven_requires_tp1: false

  - id: exp_019_atr_10_htf_40_1h
    description: "Combine tight stop (1.0 ATR) + HTF RSI 40 on 1h"
    strategy: vwap_meanrev
    days: 1826
    interval: 4h
    config_overrides:
      atr_stop_mult: 1.0
      htf_rsi_long_max: 40
      htf_rsi_bars_interval: "1h"

  # ─────────────────────────────────────────────────────────────────────
  # NEGATIVE CONTROL — re-run baseline with a different ID
  # Must produce IDENTICAL results to baseline.json. If not, halt.
  # ─────────────────────────────────────────────────────────────────────

  - id: exp_020_baseline_control
    description: "Negative control - identical config to baseline, should match exactly"
    strategy: vwap_meanrev
    days: 1826
    interval: 4h
    config_overrides: {}