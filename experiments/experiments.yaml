# Multi-timeframe baseline sweep
# Purpose: identify (strategy × timeframe) combos with real long-only edge
# Generated after long_only fix in backtest.py

baseline:
  description: "vwap_meanrev 4h baseline (post-long-only fix, reference)"
  strategy: vwap_meanrev
  days: 1826
  interval: 4h
  config_overrides: {}

experiments:
  # ─── vwap_meanrev timeframe sweep ───
  - id: sweep_001_vwap_meanrev_5m
    description: "vwap_meanrev on 5m bars"
    strategy: vwap_meanrev
    days: 1826
    interval: 5m
    config_overrides: {}

  - id: sweep_002_vwap_meanrev_15m
    description: "vwap_meanrev on 15m bars"
    strategy: vwap_meanrev
    days: 1826
    interval: 15m
    config_overrides: {}

  - id: sweep_003_vwap_meanrev_1h
    description: "vwap_meanrev on 1h bars"
    strategy: vwap_meanrev
    days: 1826
    interval: 1h
    config_overrides: {}

  # ─── volatility_breakout timeframe sweep ───
  - id: sweep_004_volatility_breakout_1h
    description: "volatility_breakout on 1h bars"
    strategy: volatility_breakout
    days: 1826
    interval: 1h
    config_overrides: {}

  - id: sweep_005_volatility_breakout_4h
    description: "volatility_breakout on 4h bars (was strong in prior tests)"
    strategy: volatility_breakout
    days: 1826
    interval: 4h
    config_overrides: {}

  # ─── htf_trend timeframe sweep ───
  - id: sweep_006_htf_trend_1h
    description: "htf_trend on 1h bars"
    strategy: htf_trend
    days: 1826
    interval: 1h
    config_overrides: {}

  - id: sweep_007_htf_trend_4h
    description: "htf_trend on 4h bars (was profitable in prior tests)"
    strategy: htf_trend
    days: 1826
    interval: 4h
    config_overrides: {}

  # ─── meanrev timeframe sweep ───
  - id: sweep_008_meanrev_1h
    description: "meanrev (BB+RSI+ADX) on 1h bars"
    strategy: meanrev
    days: 1826
    interval: 1h
    config_overrides: {}

  - id: sweep_009_meanrev_4h
    description: "meanrev (BB+RSI+ADX) on 4h bars"
    strategy: meanrev
    days: 1826
    interval: 4h
    config_overrides: {}
