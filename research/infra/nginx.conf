server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver with a short TTL so Nginx re-resolves
    # the 'api' hostname after container restarts instead of caching the old IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
        # Don't cache HTML files
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Proxy API requests to backend.
    # Using a variable for the upstream forces Nginx to re-resolve the hostname
    # via the resolver on every request (respecting the 10s TTL), so container
    # restarts that change the internal Docker IP don't cause 502s.
    location /api/ {
        set $upstream_api api;
        proxy_pass http://$upstream_api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # WebSocket support for real-time updates
    location /ws {
        set $upstream_api api;
        proxy_pass http://$upstream_api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Cache static assets (no cache for JS/CSS during development)
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header Vary "Accept-Encoding";
        # Force revalidation
        if_modified_since off;
        add_header Last-Modified "";
    }
    
    # Cache other static assets
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;
}
