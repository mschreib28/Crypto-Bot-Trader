services:
  postgres:
    image: postgres:16-alpine
    container_name: omni-bot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omni_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-omni_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omni_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omni-bot-network

  redis:
    image: redis:7-alpine
    container_name: omni-bot-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omni-bot-network

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: omni-bot-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-omni_bot}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-omni_bot}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-10}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      KRAKEN_API_KEY: ${KRAKEN_API_KEY:-}
      KRAKEN_API_SECRET: ${KRAKEN_API_SECRET:-}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omni-bot-network
    restart: unless-stopped

  ingestor:
    build:
      context: .
      dockerfile: infra/Dockerfile.ingestor
    container_name: omni-bot-ingestor
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-10}
      INGESTOR_SYMBOLS: ${INGESTOR_SYMBOLS:-BTC/USD,ETH/USD}
      INGESTOR_INTERVALS: ${INGESTOR_INTERVALS:-4h,1d}
      INGESTOR_HEALTH_FILE: ${INGESTOR_HEALTH_FILE:-/tmp/ingestor.health}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ingestor_health:/tmp
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - omni-bot-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ingestor_health:
    driver: local

networks:
  omni-bot-network:
    driver: bridge
