services:
  postgres:
    image: postgres:16-alpine
    container_name: omni-bot-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omni_bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-omni_bot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omni_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omni-bot-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: omni-bot-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - omni-bot-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: omni-bot-api
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-omni_bot}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-omni_bot}}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-50}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Kraken API credentials
      KRAKEN_API_KEY: ${KRAKEN_API_KEY:-}
      KRAKEN_API_SECRET: ${KRAKEN_API_SECRET:-}
      # Screener symbols (same as ingestor)
      INGESTOR_SYMBOLS: ${INGESTOR_SYMBOLS:-BTC/USD,ETH/USD,SOL/USD,ADA/USD,XRP/USD}
      # Account & Risk (2% rule)
      ACCOUNT_EQUITY: ${ACCOUNT_EQUITY:-41.67}
      RISK_PCT_PER_TRADE: ${RISK_PCT_PER_TRADE:-2.0}
      STOP_LOSS_PCT: ${STOP_LOSS_PCT:-5.0}
      DAILY_LOSS_LIMIT: ${DAILY_LOSS_LIMIT:-10.0}
    ports:
      - "${API_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - omni-bot-network
    restart: unless-stopped

  ingestor:
    build:
      context: .
      dockerfile: infra/Dockerfile.ingestor
    container_name: omni-bot-ingestor
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-50}
      # Empty = auto-fetch top 50 USD pairs by 24h volume from Kraken
      INGESTOR_SYMBOLS: ${INGESTOR_SYMBOLS:-}
      INGESTOR_INTERVALS: ${INGESTOR_INTERVALS:-5m,1h}
      INGESTOR_HEALTH_FILE: ${INGESTOR_HEALTH_FILE:-/tmp/ingestor.health}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Kraken API credentials for querying owned symbols
      KRAKEN_API_KEY: ${KRAKEN_API_KEY:-}
      KRAKEN_API_SECRET: ${KRAKEN_API_SECRET:-}
    volumes:
      - ingestor_health:/tmp
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - omni-bot-network
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: omni-bot-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${FRONTEND_PORT:-3001}:80"
    depends_on:
      - api
    networks:
      - omni-bot-network
    restart: unless-stopped

  runner:
    build:
      context: .
      dockerfile: infra/Dockerfile.runner
    container_name: omni-bot-runner
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-50}
      RUNNER_STRATEGY_ID: ${RUNNER_STRATEGY_ID:-mean_reversion}
      RUNNER_SYMBOL: ${RUNNER_SYMBOL:-ETH/USD}
      RUNNER_INTERVAL: ${RUNNER_INTERVAL:-4h}
      RUNNER_CONSUMER_GROUP: ${RUNNER_CONSUMER_GROUP:-strategy_runner}
      RUNNER_CONSUMER_NAME: ${RUNNER_CONSUMER_NAME:-runner_1}
      RUNNER_BLOCK_MS: ${RUNNER_BLOCK_MS:-5000}
      RUNNER_HEALTH_FILE: ${RUNNER_HEALTH_FILE:-/tmp/runner.health}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Screener configuration
      INGESTOR_SYMBOLS: ${INGESTOR_SYMBOLS:-BTC/USD,ETH/USD,SOL/USD,XRP/USD,ADA/USD,DOGE/USD,AVAX/USD,DOT/USD,MATIC/USD,LINK/USD,ATOM/USD,UNI/USD,LTC/USD,NEAR/USD,APT/USD,ARB/USD,OP/USD,FIL/USD,INJ/USD,AAVE/USD}
      SCREENER_INTERVAL_SECONDS: ${SCREENER_INTERVAL_SECONDS:-60}
      # Account & Risk (2% rule) - for signal recommendations
      ACCOUNT_EQUITY: ${ACCOUNT_EQUITY:-41.67}
      RISK_PCT_PER_TRADE: ${RISK_PCT_PER_TRADE:-2.0}
    volumes:
      - runner_health:/tmp
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - omni-bot-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ingestor_health:
    driver: local
  runner_health:
    driver: local

networks:
  omni-bot-network:
    driver: bridge
